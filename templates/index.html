<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>Fake Data Prevention</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <main>
        <h1>🛡️ Fake Data Prevention</h1>
        <p>Verify message integrity or encrypt a message using RSA.</p>
        <hr>

        <form method="POST">

            <label for="original_message">Original Message</label>
            <textarea
                id="original_message"
                name="original_message"
                required>{{ original_text }}</textarea>

            <label for="received_message">Received Message</label>
            <textarea
                id="received_message"
                name="received_message">{{ received_text }}</textarea>

            <button type="submit" name="action" value="verify">
                Verify Signature
            </button>

            <button type="submit" name="action" value="encrypt">
                Encrypt and Decrypt
            </button>

        </form>

        {% if result == "valid" %}
        <div class="result valid">
            ✔ Message is authentic.
        </div>
        {% elif result == "fake" %}
        <div class="result fake">
            ❌ Fake data detected.
        </div>
        {% endif %}

        {% if encrypted_text %}
        <div class="result">

            <h3>Encrypted Message</h3>

            <textarea readonly>{{ encrypted_text }}</textarea>

            <h3>Decrypted Message</h3>

            <textarea readonly>{{ decrypted_text }}</textarea>

        </div>
        {% endif %}

    </main>
</body>

</html>
